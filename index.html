<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Winky+Rough:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <title>Bubble Game</title>
</head>

<body>
  <div id="ui">

    <div id="topBar">
      <button id="pauseButton">⏸</button>

      <div id="lifes-container">
        <div id="life1"><img src="image/croix.png"></div>
        <div id="life2"><img src="image/croix.png"></div>
        <div id="life3"><img src="image/croix.png"></div>
      </div>

      <div id="bestScoreTraining" class="best-score">Best Score : 0</div>
      <button id="trainingDifficultyButton">MODE : EASY</button>
    </div>

    <div id="flashEffect"></div>
    <div id="flashEffectAim"></div>

    <h3 id="score">0</h3>
    <h4 id="title">BUBBLE GAME</h4>

    <div id="menu">
      <input type="text" id="playerName" placeholder="Enter your name" maxlength="15">
      <button id="startButton">PLAY</button>
      <button id="difficultyButton"><span id="difficultyLabel">MODE - </span><span
          id="difficultyText">EASY</span></button>
      <button id="menuRankingButton">LEADERBOARD</button>
      <button id="settingsButtonMenu">SETTINGS</button>
    </div>

    <div id="gameButtons">
      <button id="resumeButton">▶ RESUME</button>
      <button id="restartButton">RESTART</button>
      <button id="menuButton">MENU</button>
      <button id="settingsButtonPause">SETTINGS</button>
      <button id="rankingButton">LEADERBOARD</button>
    </div>

    <div id="gameOverButtons">
      <button id="restartButtonGameOver">RESTART</button>
      <button id="menuButtonGameOver">MENU</button>
      <button id="rankingButtonGameOver">LEADERBOARD</button>
    </div>

    <div id="settingsPopup">
      <div class="settings-content">
        <button id="closeSettings">✖</button>
        <button id="openSound">SOUND</button>
        <button id="openCursor">CURSOR</button>
        <button id="openBackground">BACKGROUND</button>
      </div>
    </div>

    <img id="customCursor" src="Cursor">
    <img id="aimCursor" src="image/viseur.png" />

    <div id="cursorPopup">
      <div class="cursor-content">
        <h2>CURSOR SIZE</h2>
        <img id="cursorPreview" src="">
        <input type="range" id="cursorSizeSlider" min="15" max="150" value="60">
        <div id="cursorChoices">
          <img src="image/cursor1.png" data-cursor="cursor1.png" class="cursor-option">
          <img src="image/cursor2.png" data-cursor="cursor2.png" class="cursor-option">
          <img src="image/cursor3.png" data-cursor="cursor3.png" class="cursor-option">
          <img src="image/cursor4.png" data-cursor="cursor4.png" class="cursor-option">
        </div>
        <button id="validateCursor">APPLY</button>
      </div>
    </div>

    <div id="YourScore"></div>

    <img id="gameOverBackground" src="image/img_explo.png">

    <div id="audioPopup">
      <div class="popup-content audio-column">

        <div class="slider">
          <div class="contentSlider">
            <h4 class="titleMusic">MUSIC : </h4>
            <input type="range" id="musicSlider" class="volumeSlider" min="0" max="100">
          </div>
          <div class="contentSlider">
            <h4>EFFECTS : </h4>
            <input type="range" id="sfxSlider" class="volumeSlider" min="0" max="100">
          </div>
        </div>
        <div class="toggleBtn">
          <button id="closeSettingsAudio">✖</button>
          <button id="soundOn">🔊</button>
          <button id="soundOff">🔇</button>
        </div>
        <!-- <button id="closeAudio">APPLY</button> -->
      </div>

    </div>
    <div id="backgroundPopup">
      <div class="background-content">
        <div id="backgroundChoices">
          <img src="image/fond1.jpg" data-bg="fond1.jpg" class="bg-option">
          <img src="image/fond2.jpg" data-bg="fond2.jpg" class="bg-option fond2">
          <img src="image/fond3.jpg" data-bg="fond3.jpg" class="bg-option">
          <img src="image/fond4.jpg" data-bg="fond4.jpg" class="bg-option">
        </div>
        <button id="closeBackground">APPLY</button>
      </div>
    </div>

    <div id="rankingPopup">
      <div>
        <h2>🏆LEADERBOARD 🏆</h2>
        <div id="rankingTabs">
          <button id="tabEasy">EASY</button>
          <button id="tabHard">HARD</button>
          <button id="tabExpert">EXPERT</button>
        </div>
        <div id="rankingList"></div>
        <button id="closeRanking">CLOSE</button>
      </div>
    </div>
  </div>

  <audio id="soundBubbleExplos" src="sound/ballon explose.mp3"></audio>
  <audio id="soundError" src="sound/erreur.wav"></audio>
  <audio id="soundSucess" src="sound/sucess.mp3"></audio>
  <audio id="soundHeart" src="sound/heart.mp3"></audio>
  <audio id="soundGameOver" src="sound/game over explose.mp3"></audio>
  <audio id="soundStresse" src="sound/stress.wav" loop></audio>
  <audio id="musicGame" src="sound/game.ogg" loop></audio>
  <audio id="musicMenu" src="sound/menu.ogg" loop></audio>
  <audio id="slowMusic" src="sound/time_stop.mp3" loop></audio>
  <audio id="soundStarMode" src="sound/star_mode.mp3" loop></audio>
  <audio id="soundStar" src="sound/star.mp3"></audio>
  <audio id="clicStar" src="sound/clic_star.mp3"></audio>
  <audio id="soundAimClick" src="sound/aim_click.mp3"></audio>
  <audio id="soundAimMode" src="sound/aim.mp3" loop></audio>
  <audio id="musicTraining" src="sound/musicTraining.mp3" loop></audio>
  <audio id="bubbleTraining" src="sound/bubble.mp3"></audio>

  <script type="module" src="main.js"></script>
</body>

</html>
