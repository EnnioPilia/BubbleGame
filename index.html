<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Winky+Rough:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/popups.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/responsive.css">
  <title>Bubble Game</title>
</head>

<body>
  <div id="ui">

    <div id="topBar">
      <button id="pauseButton"><img id="fsIcon" src="assets/image/pause.png"></button>
      <button id="fullscreenBtn"><img id="fsIcon1" src="assets/image/fullScreen.png"></button>
      <div id="lifes-container">
        <div id="life1"><img src="assets/image/croix.png" alt="life1 icon"></div>
        <div id="life2"><img src="assets/image/croix.png" alt="life2 icon"></div>
        <div id="life3"><img src="assets/image/croix.png" alt="life3 icon"></div>
      </div>

      <div id="bestScoreTraining" class="best-score">Best : 0</div>
      <button id="trainingDifficultyButton">EASY</button>
    </div>

    <div id="flashEffect"></div>
    <div id="flashEffectAim"></div>

    <h3 id="score">0</h3>
    <h4 id="title">BUBBLE GAME</h4>

    <div id="menu">
      <input type="text" id="playerName" placeholder="Enter your name" maxlength="15">
      <button id="startButton">PLAY</button>
      <button id="difficultyButton"><span id="difficultyLabel">MODE - </span><span
          id="difficultyText">EASY</span></button>
      <button id="menuRankingButton">LEADERBOARD</button>
      <button id="settingsButtonMenu">SETTINGS</button>
    </div>

    <div id="gameButtons">
      <button id="resumeButton">▶ RESUME</button>
      <button id="restartButton">RESTART</button>
      <button id="menuButton">MENU</button>
      <button id="settingsButtonPause">SETTINGS</button>
      <button id="rankingButton">LEADERBOARD</button>
    </div>

    <div id="gameOverButtons">
      <button id="restartButtonGameOver">RESTART</button>
      <button id="menuButtonGameOver">MENU</button>
      <button id="rankingButtonGameOver">LEADERBOARD</button>
    </div>

    <div id="settingsPopup">
      <div class="settings-content">
        <button id="closeSettings">✖</button>
        <button id="openSound">SOUND</button>
        <button id="openCursor">CURSOR</button>
        <button id="openBackground">BACKGROUND</button>
      </div>
    </div>

    <img id="customCursor" src="assets/image/cursor1.png">
    <img id="aimCursor" src="assets/image/viseur.png" />

    <div id="cursorPopup">
      <div class="cursor-content">
        <h2>CURSOR SIZE</h2>
        <img id="cursorPreview" src="">
        <input type="range" id="cursorSizeSlider" min="15" max="150" value="60">
        <div id="cursorChoices">
          <img src="assets/image/cursor1.png" data-cursor="cursor1.png" id="cursor1" class="cursor-option" tabindex="0">
          <img src="assets/image/cursor2.png" data-cursor="cursor2.png" id="cursor2" class="cursor-option" tabindex="0">
          <img src="assets/image/cursor3.png" data-cursor="cursor3.png" id="cursor3" class="cursor-option" tabindex="0">
          <img src="assets/image/cursor4.png" data-cursor="cursor4.png" id="cursor4" class="cursor-option" tabindex="0">
        </div>
        <button id="validateCursor">APPLY</button>
      </div>
    </div>

    <div id="YourScore"></div>
    <img id="gameOverBackground" src="assets/image/img_explo.png">

    <div id="audioPopup">
      <div class="popup-content audio-column">
        <div class="slider">
          <div class="contentSlider">
            <h4 class="titleMusic">MUSIC : </h4>
            <input type="range" id="musicSlider" class="volumeSlider" min="0" max="100">
          </div>
          <div class="contentSlider">
            <h4>EFFECTS : </h4>
            <input type="range" id="sfxSlider" class="volumeSlider" min="0" max="100">
          </div>
        </div>
        <div class="toggleBtn">
          <button id="closeSettingsAudio">✖</button>
          <button id="soundOn">🔊</button>
          <button id="soundOff">🔇</button>
        </div>
      </div>
    </div>

    <div id="backgroundPopup">
      <div class="background-content">
        <div id="backgroundChoices">
          <img src="assets/image/fond1.jpg" data-bg="fond1.jpg" id="bg1" class="bg-option" tabindex="0">
          <img src="assets/image/fond2.jpg" data-bg="fond2.jpg" id="bg2" class="bg-option fond2" tabindex="0">
          <img src="assets/image/fond3.jpg" data-bg="fond3.jpg" id="bg3" class="bg-option fond3" tabindex="0">
          <img src="assets/image/fond4.jpg" data-bg="fond4.jpg" id="bg4" class="bg-option" tabindex="0">
        </div>
        <button id="closeBackground">APPLY</button>
      </div>
    </div>

    <div id="rankingPopup">
      <div>
        <h2>🏆LEADERBOARD 🏆</h2>
        <div id="rankingTabs">
          <button id="tabEasy">EASY</button>
          <button id="tabHard">HARD</button>
          <button id="tabExpert">EXPERT</button>
        </div>
        <div id="rankingList"></div>
        <button id="closeRanking">CLOSE</button>
      </div>
    </div>
  </div>

  <audio id="soundBubbleExplos" src="assets/sound/soundBubbleExplos.mp3"></audio>
  <audio id="soundError" src="assets/sound/soundError.wav"></audio>
  <audio id="soundSucess" src="assets/sound/soundSucess.mp3"></audio>
  <audio id="soundHeart" src="assets/sound/soundHeart.mp3"></audio>
  <audio id="soundGameOver" src="assets/sound/soundGameOver.mp3"></audio>
  <audio id="soundStresse" src="assets/sound/soundStresse.wav" loop></audio>
  <audio id="musicGame" src="assets/sound/musicGame.ogg" loop></audio>
  <audio id="musicMenu" src="assets/sound/musicMenu.ogg" loop></audio>
  <audio id="slowMusic" src="assets/sound/time_stop.mp3" loop></audio>
  <audio id="soundStarMode" src="assets/sound/soundStarMode.mp3" loop></audio>
  <audio id="soundStar" src="assets/sound/soundStar.mp3"></audio>
  <audio id="clicStar" src="assets/sound/clicStar.mp3"></audio>
  <audio id="soundAimClick" src="assets/sound/soundAimClick.mp3"></audio>
  <audio id="soundAimMode" src="assets/sound/soundAimMode.mp3" loop></audio>
  <audio id="musicTraining" src="assets/sound/musicTraining.mp3" loop></audio>
  <audio id="bubbleTraining" src="assets/sound/bubbleTraining.mp3"></audio>

  <script type="module" src="main.js"></script>
</body>

</html>
