<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Winky+Rough:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <title>Bubble Game</title>
</head>

<body>
  <div id="ui">

    <div id="topBar">
      <button id="pauseButton">⏸</button>
      <div id="lifes-container">
        <div id="life1"><img src="image/croix.png"></div>
        <div id="life2"><img src="image/croix.png"></div>
        <div id="life3"><img src="image/croix.png"></div>
      </div>
    </div>

    <h3 id="score">0</h3>
    <h4 id="title">BUBBLE GAME</h4>

    <div id="menu">
      <input type="text" id="playerName" placeholder="Enter your name" maxlength="15">
      <button id="startButton">Play</button>
      <button id="difficultyButton" class="easy"> Mode : <span id="difficultyText" class="easy">EASY</span></button>
      <button id="menuRankingButton">Leaderboard</button>
      <button id="settingsButtonMenu">Settings</button>
    </div>

    <div id="settingsPopup">
      <div class="settings-content">
        <button id="openSound">Sound</button>
        <button id="openCursor">Cursor</button>
        <button id="openBackground">Background</button>
        <button id="closeSettings">Close</button>
      </div>
    </div>

    <div id="gameButtons">
      <button id="resumeButton">▶ Resume</button>
      <button id="restartButton">Restart</button>
      <button id="menuButton">Menu</button>
      <button id="settingsButtonPause">Settings</button>
      <button id="rankingButton">Leaderboard</button>
    </div>

    <div id="gameOverButtons">
      <button id="restartButtonGameOver">Restart</button>
      <button id="menuButtonGameOver">Menu</button>
      <button id="rankingButtonGameOver">Leaderboard</button>
    </div>

    <img id="customCursor" src="">

    <div id="cursorPopup">
      <div class="cursor-content">
        <h2>Cursor Size</h2>
        <img id="cursorPreview" src="">
        <input type="range" id="cursorSizeSlider" min="20" max="150" value="60">
        <div id="cursorChoices">
          <img src="image/cursor1.png" data-cursor="cursor1.png" class="cursor-option">
          <img src="image/cursor2.png" data-cursor="cursor2.png" class="cursor-option">
          <img src="image/cursor3.png" data-cursor="cursor3.png" class="cursor-option">
          <img src="image/cursor4.png" data-cursor="cursor4.png" class="cursor-option">
        </div>
        <button id="validateCursor">Apply</button>
      </div>

    </div>
    <div id="YourScore"></div>

    <img id="gameOverBackground" src="image/img_explo.png">

    <div id="audioPopup">
      <div class="popup-content">
        <button id="closeAudio">✖</button>
        <button id="soundToggle">🔊</button>
        <input type="range" id="volumeSlider">
      </div>
    </div>

    <div id="backgroundPopup">
      <div class="background-content">
        <div id="backgroundChoices">
          <img src="image/fond1.jpg" data-bg="fond1.jpg" class="bg-option">
          <img src="image/fond2.jpg" data-bg="fond2.jpg" class="bg-option">
          <img src="image/fond4.jpg" data-bg="fond4.jpg" class="bg-option">
          <img src="image/fond3.jpg" data-bg="fond3.jpg" class="bg-option">

        </div>
        <button id="closeBackground">Apply</button>
      </div>
    </div>

    <div id="rankingPopup">
      <div>
        <h2>🏆Leaderboard 🏆</h2>

        <div id="rankingTabs">
          <button id="tabEasy">Easy</button>
          <button id="tabHard">Hard</button>
        </div>
        <div id="rankingList"></div>
        <button id="closeRanking">Close</button>
      </div>

    </div>
  </div>
  <audio id="soundBubbleExplos" src="son/ballon explose.mp3"></audio>
  <audio id="soundError" src="son/erreur.wav"></audio>
  <audio id="soundSucess" src="son/sucess.mp3"></audio>
  <audio id="soundHeart" src="son/heart.mp3"></audio>
  <audio id="soundGameOver" src="son/game over explose.mp3"></audio>
  <audio id="soundStresse" src="son/stress.wav" loop></audio>
  <audio id="musicGame" src="son/game.ogg" loop></audio>
  <audio id="musicMenu" src="son/menu.ogg" loop></audio>
  <audio id="slowMusic" src="son/time_stop.mp3" loop></audio>


  <script type="module" src="main.js"></script>
</body>

</html>
